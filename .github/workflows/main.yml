name: artiste-peintre CI

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Setup npm
        uses: npm/action-setup@v4
        with:
          - version: 9.2.0

      - name: Build Project
        run: |
          npm install
          npm build
